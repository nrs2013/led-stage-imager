<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RAIN 試作 — チャート全体に降る雨</title>
<style>
  :root{ --line:#23262b; --ink:#e8eef5; --sub:#9aa6b2; --accent:#7fb6ff; --accent2:#bcd8ff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;}
  #stage{position:fixed;inset:0;overflow:hidden;background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #panel{position:fixed;top:12px;left:12px;width:262px;max-width:calc(100vw - 24px);max-height:calc(100vh - 24px);overflow:auto;
    background:rgba(16,19,24,.86);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:14px;padding:12px 12px 10px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:10;user-select:none}
  #panel h1{font-size:12px;letter-spacing:.04em;margin:0 0 2px;color:var(--accent);font-weight:700}
  #panel .sub{font-size:10px;color:var(--sub);margin:0 0 8px;line-height:1.5}
  .grp{font-size:10px;color:var(--accent);margin:10px 0 2px;border-top:1px solid var(--line);padding-top:6px;letter-spacing:.05em}
  .row{margin:6px 0}
  .row label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:2px}
  .row label b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600}
  input[type=range]{width:100%;height:18px;-webkit-appearance:none;background:transparent;margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:3px;background:linear-gradient(90deg,#26384e,#7fb6ff)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--accent2);margin-top:-6px;box-shadow:0 0 0 3px rgba(127,182,255,.22);cursor:grab}
  .btns{display:flex;gap:8px;margin:10px 0 2px}
  button{flex:1;border:1px solid var(--line);background:#161b22;color:var(--ink);border-radius:10px;padding:10px 6px;font-size:12px;font-weight:600;cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent2)}
  button.on{background:linear-gradient(180deg,#7fb6ff,#3a78d8);border-color:#bcd8ff;color:#061018}
  .mini{display:flex;gap:6px;margin-top:6px}
  .mini button{font-size:10px;padding:6px 4px;flex:1}
  .hint{font-size:10px;color:var(--sub);line-height:1.6;margin-top:8px;border-top:1px solid var(--line);padding-top:7px}
  #fps{position:fixed;bottom:10px;right:12px;font-size:10px;color:#5a6471;z-index:10;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="panel">
  <h1>RAIN / SNOW 試作 — チャート全体</h1>
  <p class="sub">雨にも雪にもなる：スピードを遅く＋色を白にすると雪（点＝フレーク）、速く＋青で雨（筋）。自動保存。</p>
  <div class="btns"><button id="btnOnoff" class="on">雨 ON / OFF</button></div>

  <div class="grp">■ 量・スピード</div>
  <div class="row"><label>量（密度） <b id="vamount">1.73</b></label><input id="amount" type="range" min="0.1" max="3.0" step="0.01" value="1.73"></div>
  <div class="row"><label>スピード（落下・遅い=雪） <b id="vspeed">0.98</b></label><input id="speed" type="range" min="0.03" max="2.6" step="0.01" value="0.98"></div>

  <div class="grp">■ 粒の大きさ</div>
  <div class="row"><label>長さ（筋の長さ） <b id="vlen">1.05</b></label><input id="len" type="range" min="0.2" max="3.0" step="0.01" value="1.05"></div>
  <div class="row"><label>太さ <b id="vwid">1.22</b></label><input id="wid" type="range" min="0.3" max="3.0" step="0.01" value="1.22"></div>

  <div class="grp">■ 風（斜め）</div>
  <div class="row"><label>風 ←左 / 右→ <b id="vwind">0.00</b></label><input id="wind" type="range" min="-1.2" max="1.2" step="0.01" value="0"></div>
  <div class="row"><label>風のゆらぎ <b id="vgust">0.00</b></label><input id="gust" type="range" min="0" max="1.5" step="0.01" value="0"></div>

  <div class="grp">■ 見え方</div>
  <div class="row"><label>奥行き（手前/奥のばらつき） <b id="vdepth">1.00</b></label><input id="depth" type="range" min="0" max="1" step="0.01" value="1.00"></div>
  <div class="row"><label>濃さ（透明度） <b id="vopacity">0.72</b></label><input id="opacity" type="range" min="0.1" max="1.6" step="0.01" value="0.72"></div>
  <div class="row"><label>色 ←雨(青) / 雪(白)→ <b id="vcol">0.54</b></label><input id="col" type="range" min="0" max="1" step="0.01" value="0.54"></div>
  <div class="row"><label>明るさ <b id="vbright">1.03</b></label><input id="bright" type="range" min="0.3" max="2.0" step="0.01" value="1.03"></div>
  <div class="row"><label>背景の明るさ（確認用・本番は0=透明） <b id="vbg">0.00</b></label><input id="bg" type="range" min="0" max="0.6" step="0.01" value="0"></div>

  <div class="mini"><button id="btnReset">つまみ初期化</button></div>
  <div class="hint">背景は確認用のグレー。本番はチャート/写真の上に乗ります（加算）。</div>
</div>
<div id="fps">—</div>

<script>
const cv=document.getElementById('cv'); const g=cv.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1);
let W=0,H=0;
function resize(){W=innerWidth;H=innerHeight;cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);buildDrops();}
addEventListener('resize',resize);

const DEF={amount:1.73,speed:0.98,len:1.05,wid:1.22,wind:0,gust:0,depth:1.0,opacity:0.72,col:0.54,bright:1.03,bg:0};
const P=Object.assign({},DEF);
let rainOn=true, fade=1;

// ---- 雨粒（layer=奥行き 0..1。手前ほど速く大きく明るい）----
let drops=[];
function mk(){ return { x: Math.random()*W*1.5 - W*0.25, y: Math.random()*H, layer: Math.random(), ph: Math.random()*6.28 }; }
function targetCount(){ return Math.round(140 + P.amount*520); }   // 量
function buildDrops(){
  const n=targetCount(); drops=[]; for(let i=0;i<n;i++) drops.push(mk());
}
resize();

let last=performance.now(),frames=0,facc=0,wt=0;
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now; wt+=dt;
  // ON/OFF フェード
  fade += ((rainOn?1:0)-fade)*Math.min(1,dt*3);
  // 量の増減（スライダー変更に追従）
  const tc=targetCount();
  if(drops.length<tc){ for(let i=drops.length;i<tc;i++) drops.push(mk()); }
  else if(drops.length>tc){ drops.length=tc; }

  // 背景（確認用グレー）
  g.setTransform(1,0,0,1,0,0); g.clearRect(0,0,cv.width,cv.height); g.scale(DPR,DPR);
  if(P.bg>0){ g.fillStyle=`rgb(${(P.bg*60)|0},${(P.bg*70)|0},${(P.bg*85)|0})`; g.fillRect(0,0,W,H); }

  // 風（ゆらぎ込み）
  const gust = P.gust*0.5*(Math.sin(wt*0.7)+Math.sin(wt*1.9+1.3)*0.5);
  const windX = (P.wind + gust) * 900;
  const baseSpeed = P.speed*1100;
  const R=Math.round(140+115*P.col), G=Math.round(200+55*P.col), B=255;   // col0=雨(青) col1=純白(雪)

  g.globalCompositeOperation='lighter';
  g.lineCap='round';
  for(let i=0;i<drops.length;i++){
    const d=drops[i];
    const lz = 1 - P.depth*(1-d.layer);    // 奥(layer小)ほど小さく遅く暗く
    const speed = baseSpeed*lz;
    const vx = windX*lz + Math.sin(wt*1.3 + d.ph)*22*lz;   // ゆらゆら(雪で効く・雨は落下優勢で無視できる)
    d.x += vx*dt; d.y += speed*dt;
    if(d.y > H+30){ d.y = -30 - Math.random()*40; d.x = Math.random()*W*1.5 - W*0.25; }
    if(d.x > W*1.25) d.x -= W*1.5; else if(d.x < -W*0.25) d.x += W*1.5;
    // 筋の長さ＝速度連動（速い=長い筋＝雨／遅い=点＝雪のフレーク）。丸キャップで点も綺麗に。
    const velMag=Math.hypot(vx,speed)||1;
    const streak = velMag * P.len * 0.018 * (0.6+0.4*lz);
    const k=streak/velMag;
    const a = (0.18 + d.layer*0.6) * P.opacity * P.bright * fade;
    g.strokeStyle=`rgba(${R},${G},${B},${a})`;
    g.lineWidth=(0.7 + d.layer*1.8)*P.wid;
    g.beginPath(); g.moveTo(d.x,d.y); g.lineTo(d.x - vx*k, d.y - speed*k); g.stroke();
  }

  frames++;facc+=dt;if(facc>=0.5){document.getElementById('fps').textContent=Math.round(frames/facc)+' fps · '+drops.length+'粒';frames=0;facc=0;}
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- controls ----
const KEYS=Object.keys(DEF); const LSKEY='rainToolP';
let saved=null; try{saved=JSON.parse(localStorage.getItem(LSKEY)||'null');}catch(e){}
KEYS.forEach(k=>{const el=document.getElementById(k),out=document.getElementById('v'+k);
 if(saved&&saved[k]!=null) el.value=saved[k];
 const apply=()=>{P[k]=parseFloat(el.value);out.textContent=P[k].toFixed(2);
   try{localStorage.setItem(LSKEY,JSON.stringify(P));}catch(e){}};
 el.addEventListener('input',apply);apply();});
function setSliders(o){KEYS.forEach(k=>{const el=document.getElementById(k);el.value=o[k];el.dispatchEvent(new Event('input'));});}
const onoff=document.getElementById('btnOnoff');
onoff.addEventListener('click',()=>{rainOn=!rainOn;onoff.classList.toggle('on',rainOn);});
document.getElementById('btnReset').addEventListener('click',()=>setSliders(DEF));
addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R')setSliders(DEF);});
</script>
</body>
</html>
