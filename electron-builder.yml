appId: com.decor.studio
productName: LED STAGE IMAGER
# 保存ファイル .ledimager をアプリに関連付け（ダブルクリックで開く）。
# アイコンは buildResources(build/) の ledimager.icns / ledimager.ico を自動採用。
fileAssociations:
  - ext: ledimager
    name: LED STAGE IMAGER Project
    role: Editor
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # dist is a symlink to dist.nosync (iCloud-eviction guard), so the builder's
  # automatic own-output exclusion misses it — exclude both names explicitly,
  # along with the other build outputs / docs / helper scripts.
  - '!{dist,dist.nosync,dist-web,docs,tools,node_modules.nosync}/**'
  - '!*.md'
  # fonts are inlined into out/renderer by vite at build time; the raw packages
  # (3000+ woff files) are dead weight at runtime
  - '!**/node_modules/@fontsource/**'
asarUnpack:
  - resources/**
  # node-syphon ships a native .node + Syphon.framework — keep them on disk (not in asar)
  # so the addon and its framework load at runtime.
  - '**/node_modules/node-syphon/**'
  # koffi (FFI) loads a prebuilt .node per platform at runtime — must be unpacked from asar.
  # Windows の NDI 直送に使う（import 自体は全プラットフォームで走る）。
  - '**/node_modules/koffi/**'
  # onnxruntime-node は prebuilt の .node + dylib を実行時にロード（深度推定の同梱エンジン）。
  - '**/node_modules/onnxruntime-node/**'
win:
  executableName: decor-studio
  files:
    # node-syphon は Mac 専用。Windows パッケージには含めない。
    - '!**/node_modules/node-syphon/**'
    # Mac 用の NDI 部品（dylib / arm64 ブリッジ）は Windows では使わない。
    - '!resources/ndi/libndi.dylib'
    - '!resources/ndi/syphon2ndi'
    # Mac 用の CoreMIDI リーダーも Windows では使わない。
    - '!resources/midi/midiread'
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  files:
    # Windows 用の NDI DLL（28MB）は Mac では使わない。Mac は libndi.dylib + ブリッジを使う。
    - '!resources/ndi/Processing.NDI.Lib.x64.dll'
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    # .ledimager を正式な型(UTI)として宣言し、書類アイコンを紐づける。
    # これが無いと macOS が動的UTI(dyn.*)を割り当て、Finder が汎用(?)アイコンを出す。
    # CFBundleDocumentTypes は fileAssociations が自動生成するので、ここでは型宣言のみ。
    - UTExportedTypeDeclarations:
        - UTTypeIdentifier: com.decor.studio.ledimager
          UTTypeDescription: LED STAGE IMAGER Project
          UTTypeConformsTo:
            - public.data
            - public.content
          UTTypeIconFile: ledimager.icns
          UTTypeTagSpecification:
            public.filename-extension:
              - ledimager
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
