<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FLAME WebGL 試作 v5 — 煙・奥行き・乱流</title>
<style>
  :root{ --line:#2a201d; --ink:#f3e7df; --sub:#b9a79c; --accent:#ff7a33; --accent2:#ffb066; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;}
  #stage{position:fixed;inset:0;overflow:hidden;background:#000;cursor:crosshair}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #fx{pointer-events:none;mix-blend-mode:screen}
  #panel{position:fixed;top:14px;left:14px;width:280px;max-width:calc(100vw - 28px);max-height:calc(100vh - 28px);overflow:auto;
    background:rgba(22,16,15,.84);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:14px;padding:13px 13px 11px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:10;user-select:none}
  #panel h1{font-size:12px;letter-spacing:.08em;margin:0 0 2px;color:var(--accent2);font-weight:700}
  #panel .sub{font-size:10.5px;color:var(--sub);margin:0 0 10px;line-height:1.5}
  .row{margin:8px 0}
  .row label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:3px}
  .row label b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600}
  input[type=range]{width:100%;height:20px;-webkit-appearance:none;background:transparent;margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:4px;background:linear-gradient(90deg,#5a2a16,#ff7a33)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--accent2);margin-top:-6px;box-shadow:0 0 0 3px rgba(255,122,51,.25),0 2px 6px rgba(0,0,0,.6);cursor:grab}
  .hot{outline:1px solid rgba(255,150,80,.5);border-radius:8px;padding:5px 6px;margin:6px -6px}
  .btns{display:flex;gap:8px;margin:11px 0 4px}
  button{flex:1;border:1px solid var(--line);background:#221715;color:var(--ink);
    border-radius:10px;padding:9px 6px;font-size:12px;font-weight:600;cursor:pointer;transition:.12s}
  button:hover{border-color:var(--accent);color:var(--accent2)}
  button:active{transform:translateY(1px)}
  button.fire{background:linear-gradient(180deg,#ff7a33,#d8480f);border-color:#ff8a4a;color:#1a0d06}
  .hint{font-size:10px;color:var(--sub);line-height:1.6;margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
  .hint kbd{background:#2a201d;border:1px solid #3a2c27;border-radius:4px;padding:1px 5px;font-size:10px;color:var(--accent2)}
  #fps{position:fixed;bottom:10px;right:12px;font-size:10px;color:#6b5950;z-index:10;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="stage"><canvas id="gl"></canvas><canvas id="fx"></canvas></div>

<div id="panel">
  <h1>🔥 FLAME v6 — 消え際の渦・脱横線</h1>
  <p class="sub">出る/消える境界の水平線を壊し、てっぺんが渦巻いて散る。煙・奥行き・乱流も継続。設定は自動保存。</p>

  <div class="row hot"><label>オレンジ量 <b id="vOrange">0.75</b></label>
    <input id="orange" type="range" min="0" max="1" step="0.01" value="0.75"></div>
  <div class="row hot"><label>リアル感（縁/筋/粒） <b id="vReal">0.70</b></label>
    <input id="real" type="range" min="0" max="1.3" step="0.01" value="0.70"></div>
  <div class="row hot"><label>煙 <b id="vSmoke">0.70</b></label>
    <input id="smoke" type="range" min="0" max="1.5" step="0.01" value="0.70"></div>
  <div class="row hot"><label>奥行き（二層） <b id="vDepth">0.60</b></label>
    <input id="depth" type="range" min="0" max="1" step="0.01" value="0.60"></div>
  <div class="row hot"><label>乱流（激しさ） <b id="vTurb">0.80</b></label>
    <input id="turb" type="range" min="0" max="1.5" step="0.01" value="0.80"></div>
  <div class="row hot"><label>境界うねり（脱・横線） <b id="vRagged">1.00</b></label>
    <input id="ragged" type="range" min="0" max="2" step="0.01" value="1.00"></div>
  <div class="row hot"><label>てっぺん渦（消え際の巻き） <b id="vCurlTop">1.00</b></label>
    <input id="curlTop" type="range" min="0" max="2" step="0.01" value="1.00"></div>
  <div class="row"><label>太さ <b id="vWidth">1.00</b></label>
    <input id="width" type="range" min="0.4" max="2.0" step="0.01" value="1.00"></div>
  <div class="row"><label>高さ <b id="vHeight">1.00</b></label>
    <input id="height" type="range" min="0.3" max="1.5" step="0.01" value="1.00"></div>
  <div class="row"><label>横ゆれ <b id="vSwirl">1.00</b></label>
    <input id="swirl" type="range" min="0" max="2" step="0.01" value="1.00"></div>
  <div class="row"><label>揺らぎ（速さ） <b id="vFlick">1.00</b></label>
    <input id="flick" type="range" min="0" max="1.5" step="0.01" value="1.00"></div>
  <div class="row"><label>明るさ <b id="vBloom">1.00</b></label>
    <input id="bloom" type="range" min="0.2" max="2.0" step="0.01" value="1.00"></div>
  <div class="row"><label>暖色 ←赤 / 黄→ <b id="vWarm">0.50</b></label>
    <input id="warm" type="range" min="0" max="1" step="0.01" value="0.50"></div>
  <div class="row"><label>火花の量 <b id="vSpark">0.45</b></label>
    <input id="spark" type="range" min="0" max="1.5" step="0.01" value="0.45"></div>

  <div class="btns"><button id="btnBurst">単発</button><button id="btnHold" class="fire">長押し（噴射）</button></div>
  <div class="hint"><b>押し続け＝噴射</b>／<b>クリック＝単発</b>。<kbd>Space</kbd>噴射 <kbd>F</kbd>単発 <kbd>R</kbd>リセット<br>設定は自動保存（開き直しても保持）</div>
</div>
<div id="fps">—</div>

<script>
const glc=document.getElementById('gl'), fxc=document.getElementById('fx');
const gl=glc.getContext('webgl',{antialias:false,premultipliedAlpha:false});
const fx=fxc.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1);

const VS=`attribute vec2 a; void main(){ gl_Position=vec4(a,0.,1.); }`;
const FS=`
precision highp float;
uniform vec2 uRes;
uniform float uTime,uHeight,uWidth,uFlicker,uWarmth,uBloom,uTurb,uBaseX,uRise,uWin,uSwirl,uOrange,uReal,uSmoke,uDepth,uRagged,uCurlTop;
uniform sampler2D uHist;

float hash(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);
 float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
 return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
float fbm(vec2 p){float v=0.,a=0.55;for(int i=0;i<6;i++){v+=a*noise(p);p=p*2.02+vec2(1.7,9.2);a*=0.5;}return v;}
float fbm4(vec2 p){float v=0.,a=0.55;for(int i=0;i<4;i++){v+=a*noise(p);p=p*2.02+vec2(1.7,9.2);a*=0.5;}return v;}
vec2 curl(vec2 p){float e=0.06;
 float x=fbm(p+vec2(0.,e))-fbm(p-vec2(0.,e));
 float y=fbm(p+vec2(e,0.))-fbm(p-vec2(e,0.));
 return vec2(x,-y)/(2.*e);}

// returns vec3(heat, radial, vert)
vec3 flameHeat(float px,float py,float scale,float tsh,float wmul,float blur){
 float tt=uTime+tsh;
 float h=clamp(py/(0.82*uHeight*scale),0.0,1.5);
 float base=0.060*uWidth*wmul, belly=0.230*uWidth*wmul;
 float rs=smoothstep(0.0,0.16,h); float fall=1.0-smoothstep(0.30,1.02,h);
 float halfw=max(base+(belly-base)*rs*(0.30+0.70*fall),0.012);
 float edgeN=fbm(vec2(px*3.0+10.0, py*5.0 - tt*2.8));
 halfw=max(halfw*(1.0+uReal*0.35*(edgeN-0.5)*2.0),0.008);
 vec2 cc=curl(vec2(px*3.0, py*2.2 - tt*1.3));
 vec2 w=vec2(px,py)+uTurb*0.06*cc;
 float sway=(cc.x-0.5)*0.03*(0.2+h)*uSwirl + uReal*0.018*sin(py*7.0-tt*4.0);
 float xr=(px-sway)/halfw;
 float radial=exp(-2.2*xr*xr/blur);
 float nf=fbm(vec2(w.x*2.4, w.y*2.6 - tt*2.2));
 float nf2=fbm4(vec2(w.x*5.5, w.y*6.0 - tt*3.6));
 float turb=0.62*nf+0.38*nf2;
 float bdy=radial*(0.86+(0.30+0.5*uTurb)*(turb-0.5));
 float vein=fbm4(vec2(px*6.5, py*2.0 - tt*3.0));
 bdy=bdy*(1.0-uReal*0.42*smoothstep(0.52,1.0,vein));
 float vert=1.0-smoothstep(0.45,1.06,h);
 float dens=clamp(bdy*vert,0.0,1.6);
 dens=clamp(dens-smoothstep(0.62,1.05,h)*(1.0-turb)*0.5,0.0,1.6);
 float heat=pow(max(dens*(1.30-0.5*clamp(h,0.0,1.0)),0.0),1.10);
 return vec3(heat,radial,vert);
}

void main(){
 vec2 uv=gl_FragCoord.xy/uRes;
 float aspect=uRes.x/uRes.y;
 vec2 p=vec2((uv.x-uBaseX)*aspect, uv.y-0.06);
 float px=p.x, py=p.y;

 // 燃料前線：水平線を壊す（低周波うねり＋上ほど大きく＝てっぺんが巻く/ぼわっ）
 float fa=(py/max(uRise,0.001))/uWin;
 float hh=clamp(py/(0.82*uHeight),0.0,1.4);
 float topw=smoothstep(0.30,1.05,hh);
 float ln=fbm(vec2(px*2.2+3.0, py*1.3 - uTime*1.3))-0.5;
 vec2 cf=curl(vec2(px*2.0, py*1.6 - uTime*1.2));
 float cfxn=clamp(cf.x,-1.0,1.0), cfyn=clamp(cf.y,-1.0,1.0);
 float lobe=ln+0.30*cfyn;
 float amp=uRagged*(0.03+0.06*topw);
 float faJit=fa+lobe*amp;
 float fuel=texture2D(uHist, vec2(clamp(faJit,0.0,0.999),0.5)).r;
 if(faJit>=1.0||py<0.0) fuel=0.0;
 // 先端だけ局所的に渦ワープ（マッシュルーム状に巻く・根元は歪めない）
 float sw=uCurlTop*0.05*topw;
 float wpx=px+cfxn*sw, wpy=py+cfyn*sw;
 float flk=0.9+0.1*sin(uTime*22.0+py*8.0)*uFlicker;

 // 奥行き：奥(太く・暗く・ぼかし) ＋ 手前（先端ワープ座標で評価）
 vec3 fr=flameHeat(wpx,wpy,1.0,0.0,1.0,1.0);
 vec3 bk=flameHeat(wpx,wpy,1.18,7.0,1.25,1.7);
 float fradial=fr.y;
 float heat=max(fr.x, bk.x*(0.45+0.2*uDepth));
 heat*=fuel*flk;
 float e=heat*2.6*uBloom;

 vec3 deep=vec3(1.20,0.25,0.04), org=vec3(1.95,0.72,0.15), white=vec3(2.60,2.35,2.05);
 float wRed=smoothstep(0.04,0.26,e);
 float wOrg=smoothstep(0.28,0.78,e);
 float wWhite=smoothstep(0.95+0.70*uOrange, 1.55+0.85*uOrange, e);
 vec3 col=deep*wRed + (org-deep)*wOrg + (white-org)*wWhite;

 // 煙：炎の上から立ち上る乱流プルーム（下=炎で照らされ橙、上=グレー）
 float sh=clamp((py-0.18*uHeight)/(1.0*uHeight),0.0,1.4);
 vec2 sc=curl(vec2(px*2.2+5.0, py*1.3 - uTime*0.9));
 float swx=px*2.0 + 0.9*sc.x + 0.10*sin(py*3.0 - uTime*1.1);
 float smN=fbm(vec2(swx, py*1.8 - uTime*1.4));
 float plume=smoothstep(0.45,0.95,smN);
 float wq=px/(0.10+0.22*sh+0.0001); float widthEnv=exp(-wq*wq);
 float riseEnv=smoothstep(0.0,0.25,sh)*(1.0-smoothstep(0.7,1.35,sh));
 float smDens=plume*widthEnv*riseEnv*uSmoke*fuel;
 float litO=1.0-smoothstep(0.0,0.5,sh);
 vec3 smCol=vec3(0.50*litO+0.10, 0.26*litO+0.09, 0.10*litO+0.08);
 col*=1.0-0.45*smDens*(1.0-fradial);        // 煙が炎の縁を隠す
 col+=smCol*smDens*1.3;                       // 煙自体が淡く光る

 // 暖色＋粒状感
 col.r*=1.0+(0.5-uWarmth)*0.20; col.b*=1.0+(uWarmth-0.5)*0.25;
 float grain=fbm(vec2(px*22.0, py*26.0 - uTime*5.0));
 col*=1.0+uReal*0.20*(grain-0.5)*2.0;

 vec3 o=vec3(1.0)-exp(-col*1.15);
 o=pow(o,vec3(0.4545));
 gl_FragColor=vec4(o,1.0);
}`;

function compile(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);
 if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aloc=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(aloc);
gl.vertexAttribPointer(aloc,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(prog,n);
const u={res:U('uRes'),time:U('uTime'),h:U('uHeight'),w:U('uWidth'),flick:U('uFlicker'),warm:U('uWarmth'),
 bloom:U('uBloom'),turb:U('uTurb'),baseX:U('uBaseX'),rise:U('uRise'),win:U('uWin'),swirl:U('uSwirl'),
 hist:U('uHist'),orange:U('uOrange'),real:U('uReal'),smoke:U('uSmoke'),depth:U('uDepth'),ragged:U('uRagged'),curlTop:U('uCurlTop')};

const HN=160, HWIN=0.55, HD=HWIN/HN, RISE0=3.0;
const hist=new Float32Array(HN);
const histBytes=new Uint8Array(HN*4);
const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.pixelStorei(gl.UNPACK_ALIGNMENT,1);
function uploadHist(){
 for(let i=0;i<HN;i++){const v=Math.max(0,Math.min(255,hist[i]*255))|0;
   histBytes[i*4]=v;histBytes[i*4+1]=v;histBytes[i*4+2]=v;histBytes[i*4+3]=255;}
 gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);
 gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,HN,1,0,gl.RGBA,gl.UNSIGNED_BYTE,histBytes);
}

const P={orange:.75,real:.7,smoke:.7,depth:.6,turb:.8,ragged:1,curlTop:1,height:1,width:1,flick:1,warm:.5,bloom:1,swirl:1,spark:.45};
let fuel=0,holding=false,burstUntil=0,baseX=0.5,hacc=0,W=0,H=0;

function resize(){W=innerWidth;H=innerHeight;
 glc.width=fxc.width=Math.round(W*DPR);glc.height=fxc.height=Math.round(H*DPR);
 gl.viewport(0,0,glc.width,glc.height);}
addEventListener('resize',resize);resize();

const sparks=[];
function nozzlePx(){return {x:baseX*W,y:H*(1-0.06)};}
function emitSparks(n){const o=nozzlePx();
 for(let i=0;i<n;i++){const a=-Math.PI/2+(Math.random()-0.5)*0.6;const sp=2+Math.random()*4.5;
  sparks.push({x:o.x+(Math.random()-0.5)*14,y:o.y,vx:Math.cos(a)*sp,
   vy:Math.sin(a)*sp*(2.4+Math.random()*2.6),life:1,decay:0.012+Math.random()*0.02,
   size:0.8+Math.random()*1.6,hot:Math.random()});}}
function updateSparks(){
 fx.clearRect(0,0,fxc.width,fxc.height);fx.save();fx.scale(DPR,DPR);
 fx.globalCompositeOperation='lighter';
 for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];
  s.vy+=0.17;s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
  if(s.life<=0||s.y>H){sparks.splice(i,1);continue;}
  const a=Math.max(0,s.life);
  fx.beginPath();fx.fillStyle=s.hot>0.6?`rgba(255,238,205,${a})`:`rgba(255,140,55,${a})`;
  fx.arc(s.x,s.y,s.size*(0.6+a*0.5),0,6.283);fx.fill();}
 fx.restore();}

let t0=performance.now(),last=t0,frames=0,facc=0;
function frame(now){
 const dt=Math.min(0.05,(now-last)/1000);last=now;
 const firing=(holding||now<burstUntil);
 fuel+=((firing?1:0)-fuel)*Math.min(1,dt*(firing?34:26));
 hacc+=dt;
 while(hacc>=HD){for(let i=HN-1;i>0;i--)hist[i]=hist[i-1];hist[0]=fuel;hacc-=HD;}
 uploadHist();
 if(fuel>0.3){const want=fuel*P.spark*8*dt*60;
  if(want>=1||Math.random()<want)emitSparks(Math.max(1,Math.floor(want)));}
 updateSparks();
 gl.uniform2f(u.res,glc.width,glc.height);
 gl.uniform1f(u.time,(now-t0)/1000);
 gl.uniform1f(u.h,P.height);gl.uniform1f(u.w,P.width);gl.uniform1f(u.flick,P.flick);
 gl.uniform1f(u.warm,P.warm);gl.uniform1f(u.bloom,P.bloom);gl.uniform1f(u.turb,P.turb);
 gl.uniform1f(u.baseX,baseX);gl.uniform1f(u.rise,RISE0);gl.uniform1f(u.win,HWIN);
 gl.uniform1f(u.swirl,P.swirl);gl.uniform1f(u.orange,P.orange);gl.uniform1f(u.real,P.real);
 gl.uniform1f(u.smoke,P.smoke);gl.uniform1f(u.depth,P.depth);
 gl.uniform1f(u.ragged,P.ragged);gl.uniform1f(u.curlTop,P.curlTop);gl.uniform1i(u.hist,0);
 gl.drawArrays(gl.TRIANGLES,0,3);
 frames++;facc+=dt;if(facc>=0.5){document.getElementById('fps').textContent=
  Math.round(frames/facc)+' fps · '+sparks.length+' sparks';frames=0;facc=0;}
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const sliders=[['orange','vOrange'],['real','vReal'],['smoke','vSmoke'],['depth','vDepth'],['turb','vTurb'],
 ['ragged','vRagged'],['curlTop','vCurlTop'],
 ['width','vWidth'],['height','vHeight'],['swirl','vSwirl'],['flick','vFlick'],['bloom','vBloom'],['warm','vWarm'],['spark','vSpark']];
const keyMap={orange:'orange',real:'real',smoke:'smoke',depth:'depth',turb:'turb',ragged:'ragged',curlTop:'curlTop',width:'width',height:'height',swirl:'swirl',flick:'flick',bloom:'bloom',warm:'warm',spark:'spark'};
const LSKEY='flameV5P';
let saved=null; try{saved=JSON.parse(localStorage.getItem(LSKEY)||'null');}catch(e){}
sliders.forEach(([id,vid])=>{const el=document.getElementById(id),out=document.getElementById(vid);
 if(saved && saved[keyMap[id]]!=null) el.value=saved[keyMap[id]];
 const apply=()=>{P[keyMap[id]]=parseFloat(el.value);out.textContent=parseFloat(el.value).toFixed(2);
   try{localStorage.setItem(LSKEY,JSON.stringify(P));}catch(e){}};
 el.addEventListener('input',apply);apply();});

function setBaseFromEvent(e){const r=glc.getBoundingClientRect();
 const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
 baseX=Math.min(0.97,Math.max(0.03,cx/r.width));}
const stage=document.getElementById('stage');
stage.addEventListener('pointerdown',e=>{setBaseFromEvent(e);holding=true;emitSparks(Math.round(14*P.spark+4));});
addEventListener('pointerup',()=>holding=false);
addEventListener('pointercancel',()=>holding=false);
document.getElementById('btnBurst').addEventListener('click',e=>{e.stopPropagation();burstUntil=performance.now()+220;emitSparks(Math.round(12*P.spark+4));});
document.getElementById('btnHold').addEventListener('pointerdown',e=>{e.stopPropagation();holding=true;emitSparks(Math.round(14*P.spark+4));});
addEventListener('keydown',e=>{if(e.repeat)return;
 if(e.code==='Space'){e.preventDefault();holding=true;emitSparks(Math.round(14*P.spark+4));}
 if(e.key==='f'||e.key==='F'){burstUntil=performance.now()+220;emitSparks(Math.round(12*P.spark+4));}
 if(e.key==='r'||e.key==='R'){sparks.length=0;fuel=0;hist.fill(0);}});
addEventListener('keyup',e=>{if(e.code==='Space')holding=false;});
</script>
</body>
</html>
